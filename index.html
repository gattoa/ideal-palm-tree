<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
    <title>ideal-palm-tree</title>
  </head>
  <body>
    <div id="app">
      <header class="todo-header">
        <h1 class="todo-title">Todo</h1>
        <p class="todo-journey" id="todo-journey" aria-live="polite">0 done · 0 in progress</p>
      </header>
      <form class="todo-form" action="#" method="dialog" aria-label="Add todo">
        <label for="todo-input" class="visually-hidden">New todo</label>
        <input id="todo-input" class="todo-input" type="text" name="todo" placeholder="What needs to be done?" autocomplete="off" />
        <button type="submit" class="todo-add-button">Add</button>
      </form>
      <ul class="todo-list" aria-label="Todo items"></ul>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
